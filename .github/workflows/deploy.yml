name: Build & Deploy to Digital Ocean

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repo name (lowercase)
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & push reception
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/reception_service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/reception:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/reception:latest

      - name: Build & push housekeeping
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/housekeeping_service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/housekeeping:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/housekeeping:latest

      - name: Build & push room_service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/room_service_service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/room_service:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/room_service:latest

      - name: Build & push maintenance
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/maintenance_service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/maintenance:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/maintenance:latest

      - name: Build & push dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dashboard_service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/dashboard:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/dashboard:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest

  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set repo name (lowercase)
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/hotelOS"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/hotelOS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export GITHUB_REPOSITORY=${{ env.REPO }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            export DASHBOARD_API_KEY=${{ secrets.DASHBOARD_API_KEY }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
