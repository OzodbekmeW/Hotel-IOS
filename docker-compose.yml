version: "3.9"

services:

  caddy:
    image: caddy:2-alpine
    container_name: hotelOS-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  redis:
    image: redis:7-alpine
    container_name: hotelOS-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  reception:
    build:
      context: ./backend
      dockerfile: reception_service/Dockerfile
    container_name: hotelOS-reception
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  housekeeping:
    build:
      context: ./backend
      dockerfile: housekeeping_service/Dockerfile
    container_name: hotelOS-housekeeping
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  room_service:
    build:
      context: ./backend
      dockerfile: room_service_service/Dockerfile
    container_name: hotelOS-room-service
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  maintenance:
    build:
      context: ./backend
      dockerfile: maintenance_service/Dockerfile
    container_name: hotelOS-maintenance
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./backend
      dockerfile: dashboard_service/Dockerfile
    container_name: hotelOS-dashboard
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DASHBOARD_API_KEY=hotelOS-secret-2024
      - RECEPTION_URL=http://reception:8001
      - ROOM_SERVICE_URL=http://room_service:8003
      - MAINTENANCE_URL=http://maintenance:8004
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotelOS-frontend
    restart: unless-stopped
    depends_on:
      - reception
      - housekeeping
      - room_service
      - maintenance
      - dashboard

volumes:
  caddy_data:
  caddy_config:
